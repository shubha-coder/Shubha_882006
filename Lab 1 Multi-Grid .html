<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 1: Multi-Break Grid Activity</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <style>
        /* Custom CSS using properties from your notes [cite: 1, 5] */
        .card {
            transition: transform 0.3s ease; /* Transition property [cite: 18] */
            border-radius: 15px; /* Border radius property [cite: 5] */
        }
        .card:hover {
            transform: translateY(-5px); /* 2D Transform [cite: 19] */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .faculty-img-placeholder {
            height: 150px;
            background-color: #e9ecef;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            margin-bottom: 15px; /* Margin property */
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">University Faculty Directory</h1>
            <p class="lead text-muted">A responsive Multi-Break Grid example using Bootstrap</p>
        </header>
        <div class="row">
                  <script>
                const facultyNames = [
                    "Dr. Arjun Mehta", "Prof. Sarah Chen", "Dr. James Wilson", "Prof. Maria Garcia",
                    "Dr. Kenji Sato", "Prof. Elena Rossi", "Dr. David Smith", "Prof. Linda Wu",
                    "Dr. Robert Brown", "Prof. Susan White", "Dr. Michael Chang", "Prof. Anna Muller"
                ];

                facultyNames.forEach(name => {
                    document.write(`
                        <div class="col-12 col-sm-6 col-md-4 col-lg-3 mb-4">
                            <div class="card h-100 p-3 shadow-sm border-0">
                                <div class="faculty-img-placeholder">
                                    <span class="text-muted">Faculty Photo</span>
                                </div>
                                <div class="card-body p-0 text-center">
                                    <h5 class="card-title">${name}</h5>
                                    <p class="card-text text-secondary small">Department of Computer Science</p>
                                    <hr class="my-3"> <a href="#" class="btn btn-primary btn-sm w-100">View Publications</a>
                                </div>
                            </div>
                        </div>
                    `);
                });
            </script>
        </div> <footer class="text-center py-4 text-muted border-top mt-5">
            <p>&copy; 2026 University Computer Science Lab | Build Responsive Websites [cite: 481]</p>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <img src ="pro.jpeg">
</body>
</html>
